<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusCash - Smart Student Budget Tracker</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0f0f1a;
            --card: #1a1a2e;
            --card2: #16213e;
            --accent: #00d4aa;
            --green: #00d4aa;
            --red: #ff6b6b;
            --yellow: #ffd93d;
            --text: #e0e0e0;
            --muted: #888;
            --border: #2a2a4a;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        /* ── AUTH SCREENS ── */
        .auth-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #0f3460 100%); }
        .auth-card { background: var(--card); border-radius: 24px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,212,170,0.1); border: 1px solid var(--border); }
        .auth-logo { text-align:center; margin-bottom:30px; }
        .auth-logo .icon { font-size: 48px; }
        .auth-logo h1 { font-size: 28px; font-weight: 800; color: var(--accent); margin-top: 8px; }
        .auth-logo p { color: var(--muted); font-size: 14px; margin-top: 4px; }
        .auth-tabs { display:flex; background:#0f0f1a; border-radius:12px; padding:4px; margin-bottom:24px; }
        .auth-tab { flex:1; padding:10px; text-align:center; border-radius:10px; cursor:pointer; font-weight:600; font-size:14px; color:var(--muted); transition:.3s; border:none; background:transparent; }
        .auth-tab.active { background:var(--accent); color:#000; }
        .form-group { margin-bottom:16px; }
        .form-group label { display:block; font-size:13px; color:var(--muted); margin-bottom:6px; font-weight:500; }
        .form-group input, .form-group select { width:100%; padding:12px 16px; background:#0f0f1a; border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:14px; outline:none; transition:.3s; }
        .form-group input:focus, .form-group select:focus { border-color:var(--accent); box-shadow: 0 0 0 3px rgba(0,212,170,0.1); }
        .form-group select option { background:#1a1a2e; }
        .btn-primary { width:100%; padding:14px; background: linear-gradient(135deg, #00d4aa, #0095ff); border:none; border-radius:12px; color:#000; font-size:16px; font-weight:700; cursor:pointer; transition:.3s; margin-top:8px; }
        .btn-primary:hover { transform:translateY(-2px); box-shadow: 0 8px 25px rgba(0,212,170,0.4); }
        .auth-error { background: rgba(255,107,107,0.1); border: 1px solid var(--red); border-radius:10px; padding:10px 14px; font-size:13px; color:var(--red); margin-bottom:16px; display:none; }

        /* ── APP SCREEN ── */
        #app-screen { display:none; }
        .navbar { background: var(--card); padding: 0 20px; height: 64px; display:flex; align-items:center; justify-content:space-between; border-bottom: 1px solid var(--border); position:sticky; top:0; z-index:100; }
        .navbar-brand { display:flex; align-items:center; gap:10px; }
        .navbar-brand .logo { font-size:24px; }
        .navbar-brand h2 { font-size:20px; font-weight:800; color:var(--accent); }
        .navbar-right { display:flex; align-items:center; gap:12px; }
        .user-badge { background: rgba(0,212,170,0.1); border: 1px solid var(--accent); padding: 6px 14px; border-radius:20px; font-size:13px; color:var(--accent); font-weight:600; }
        .btn-logout { background:rgba(255,107,107,0.1); border:1px solid var(--red); color:var(--red); padding:6px 14px; border-radius:20px; font-size:13px; cursor:pointer; font-weight:600; transition:.3s; }
        .btn-logout:hover { background:var(--red); color:#fff; }

        .main-content { padding: 24px 20px; max-width: 1200px; margin: 0 auto; }

        /* ── BALANCE CARDS ── */
        .cards-grid { display:grid; grid-template-columns: repeat(3, 1fr); gap:16px; margin-bottom:24px; }
        .balance-card { background: var(--card); border-radius:16px; padding:20px; border: 1px solid var(--border); transition:.3s; }
        .balance-card:hover { transform:translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .balance-card .label { font-size:13px; color:var(--muted); font-weight:500; margin-bottom:8px; display:flex; align-items:center; gap:6px; }
        .balance-card .amount { font-size:26px; font-weight:800; }
        .balance-card.total { border-color: var(--accent); background: linear-gradient(135deg, rgba(0,212,170,0.05), rgba(0,149,255,0.05)); }
        .balance-card.total .amount { color: var(--accent); font-size:32px; }
        .balance-card.income .amount { color: var(--green); }
        .balance-card.expense .amount { color: var(--red); }

        /* ── MAIN GRID ── */
        .main-grid { display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-bottom:24px; }

        /* ── ADD TRANSACTION ── */
        .section-card { background: var(--card); border-radius:16px; padding:24px; border: 1px solid var(--border); }
        .section-title { font-size:16px; font-weight:700; margin-bottom:20px; display:flex; align-items:center; gap:8px; }
        .type-toggle { display:flex; background:#0f0f1a; border-radius:10px; padding:4px; margin-bottom:16px; }
        .type-btn { flex:1; padding:8px; text-align:center; border-radius:8px; cursor:pointer; font-weight:600; font-size:13px; transition:.3s; border:none; background:transparent; }
        .type-btn.income.active { background:var(--green); color:#000; }
        .type-btn.expense.active { background:var(--red); color:#fff; }
        .type-btn:not(.active) { color:var(--muted); }
        .input-group { margin-bottom:12px; }
        .input-group label { display:block; font-size:12px; color:var(--muted); margin-bottom:5px; }
        .input-group input, .input-group select { width:100%; padding:10px 14px; background:#0f0f1a; border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:14px; outline:none; transition:.3s; }
        .input-group input:focus, .input-group select:focus { border-color:var(--accent); }
        .input-group select option { background:#1a1a2e; }
        .btn-add-income { width:100%; padding:12px; background:linear-gradient(135deg,#00d4aa,#00a884); border:none; border-radius:10px; color:#000; font-weight:700; cursor:pointer; transition:.3s; font-size:14px; }
        .btn-add-expense { width:100%; padding:12px; background:linear-gradient(135deg,#ff6b6b,#ee5a24); border:none; border-radius:10px; color:#fff; font-weight:700; cursor:pointer; transition:.3s; font-size:14px; }
        .btn-add-income:hover, .btn-add-expense:hover { transform:translateY(-2px); }

        /* ── CHART ── */
        .chart-container { position:relative; height:220px; }

        /* ── TRANSACTIONS ── */
        .transactions-section { background: var(--card); border-radius:16px; padding:24px; border: 1px solid var(--border); }
        .transactions-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
        .filter-tabs { display:flex; gap:8px; }
        .filter-tab { padding:6px 14px; border-radius:20px; border:1px solid var(--border); background:transparent; color:var(--muted); font-size:12px; cursor:pointer; font-weight:600; transition:.3s; }
        .filter-tab.active { border-color:var(--accent); color:var(--accent); background:rgba(0,212,170,0.1); }
        .transaction-item { display:flex; align-items:center; justify-content:space-between; padding:14px; background:#0f0f1a; border-radius:12px; margin-bottom:10px; border:1px solid var(--border); transition:.3s; }
        .transaction-item:hover { border-color:var(--accent); }
        .transaction-left { display:flex; align-items:center; gap:12px; }
        .transaction-icon { width:42px; height:42px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:18px; }
        .transaction-icon.income { background:rgba(0,212,170,0.1); }
        .transaction-icon.expense { background:rgba(255,107,107,0.1); }
        .transaction-info .desc { font-weight:600; font-size:14px; }
        .transaction-info .meta { font-size:12px; color:var(--muted); margin-top:2px; }
        .transaction-right { display:flex; align-items:center; gap:12px; }
        .transaction-amount { font-weight:700; font-size:16px; }
        .transaction-amount.income { color:var(--green); }
        .transaction-amount.expense { color:var(--red); }
        .btn-delete { background:rgba(255,107,107,0.1); border:1px solid transparent; color:var(--red); width:28px; height:28px; border-radius:8px; cursor:pointer; font-size:12px; transition:.3s; display:flex; align-items:center; justify-content:center; }
        .btn-delete:hover { border-color:var(--red); }
        .empty-state { text-align:center; padding:40px; color:var(--muted); }
        .empty-state .icon { font-size:48px; margin-bottom:12px; }

        /* ── TOAST ── */
        .toast { position:fixed; bottom:24px; right:24px; background:var(--card); border:1px solid var(--accent); border-radius:12px; padding:14px 20px; font-size:14px; font-weight:600; color:var(--accent); box-shadow:0 10px 30px rgba(0,0,0,0.3); z-index:999; transform:translateY(100px); opacity:0; transition:.4s cubic-bezier(.175,.885,.32,1.275); }
        .toast.show { transform:translateY(0); opacity:1; }
        .toast.error { border-color:var(--red); color:var(--red); }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .cards-grid { grid-template-columns: 1fr; }
            .main-grid { grid-template-columns: 1fr; }
            .navbar-brand h2 { font-size:16px; }
            .balance-card.total .amount { font-size:24px; }
        }
    </style>
</head>
<body>

<!-- ── WELCOME SCREEN ── -->
<div id="welcome-screen" class="auth-screen">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="icon">💰</div>
            <h1>CampusCash</h1>
            <p>Smart Budget Tracker for Students</p>
        </div>
        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchTab('login')">Login</button>
            <button class="auth-tab" onclick="switchTab('register')">Register</button>
        </div>

        <!-- Login Form -->
        <div id="login-form">
            <div class="auth-error" id="login-error"></div>
            <div class="form-group">
                <label>Matric Number</label>
                <input type="text" id="login-matric" placeholder="e.g. CSC/2021/001">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="Enter your password">
            </div>
            <button class="btn-primary" onclick="login()">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </div>

        <!-- Register Form -->
        <div id="register-form" style="display:none">
            <div class="auth-error" id="register-error"></div>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="reg-name" placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label>Matric Number</label>
                <input type="text" id="reg-matric" placeholder="e.g. CSC/2021/001">
            </div>
            <div class="form-group">
                <label>Department</label>
                <select id="reg-dept">
                    <option value="">Select Department</option>
                    <option>Computer Science</option>
                    <option>Information Technology</option>
                    <option>Electrical Engineering</option>
                    <option>Mechanical Engineering</option>
                    <option>Business Administration</option>
                    <option>Accounting</option>
                    <option>Medicine</option>
                    <option>Law</option>
                    <option>Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="reg-password" placeholder="Create a password">
            </div>
            <button class="btn-primary" onclick="register()">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
        </div>
    </div>
</div>

<!-- ── APP SCREEN ── -->
<div id="app-screen">
    <nav class="navbar">
        <div class="navbar-brand">
            <span class="logo">💰</span>
            <h2>CampusCash</h2>
        </div>
        <div class="navbar-right">
            <span class="user-badge" id="user-badge">👤 Student</span>
            <button class="btn-logout" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </nav>

    <div class="main-content">
        <!-- Balance Cards -->
        <div class="cards-grid">
            <div class="balance-card income">
                <div class="label"><i class="fas fa-arrow-up"></i> Total Income</div>
                <div class="amount" id="total-income">₦0.00</div>
            </div>
            <div class="balance-card total">
                <div class="label"><i class="fas fa-wallet"></i> Current Balance</div>
                <div class="amount" id="total-balance">₦0.00</div>
            </div>
            <div class="balance-card expense">
                <div class="label"><i class="fas fa-arrow-down"></i> Total Expenses</div>
                <div class="amount" id="total-expense">₦0.00</div>
            </div>
        </div>

        <!-- Main Grid -->
        <div class="main-grid">
            <!-- Add Transaction -->
            <div class="section-card">
                <div class="section-title">
                    <i class="fas fa-plus-circle" style="color:var(--accent)"></i>
                    Add Transaction
                </div>
                <div class="type-toggle">
                    <button class="type-btn income active" id="btn-income" onclick="setType('income')">
                        <i class="fas fa-arrow-up"></i> Income
                    </button>
                    <button class="type-btn expense" id="btn-expense" onclick="setType('expense')">
                        <i class="fas fa-arrow-down"></i> Expense
                    </button>
                </div>
                <div class="input-group">
                    <label>Description</label>
                    <input type="text" id="t-desc" placeholder="e.g. Monthly Allowance">
                </div>
                <div class="input-group">
                    <label>Category</label>
                    <select id="t-category">
                        <option value="General">General</option>
                        <option value="Food">🍔 Food & Drinks</option>
                        <option value="Transport">🚌 Transport</option>
                        <option value="Books">📚 Books & Stationery</option>
                        <option value="Rent">🏠 Rent & Accommodation</option>
                        <option value="Entertainment">🎮 Entertainment</option>
                        <option value="Health">💊 Health</option>
                        <option value="Clothing">👕 Clothing</option>
                        <option value="Allowance">💵 Allowance</option>
                        <option value="Part-time">💼 Part-time Job</option>
                        <option value="Other">📦 Other</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Amount (₦)</label>
                    <input type="number" id="t-amount" placeholder="0.00" min="0">
                </div>
                <button class="btn-add-income" id="add-btn" onclick="addTransaction()">
                    <i class="fas fa-plus"></i> Add Income
                </button>
            </div>

            <!-- Chart -->
            <div class="section-card">
                <div class="section-title">
                    <i class="fas fa-chart-pie" style="color:var(--accent)"></i>
                    Spending Overview
                </div>
                <div class="chart-container">
                    <canvas id="myChart"></canvas>
                </div>
                <div id="no-chart" style="text-align:center;color:var(--muted);padding:20px;font-size:13px;">
                    Add transactions to see your chart!
                </div>
            </div>
        </div>

        <!-- Transactions -->
        <div class="transactions-section">
            <div class="transactions-header">
                <div class="section-title" style="margin:0">
                    <i class="fas fa-list" style="color:var(--accent)"></i>
                    Transaction History
                </div>
                <div class="filter-tabs">
                    <button class="filter-tab active" onclick="filterTx('all')">All</button>
                    <button class="filter-tab" onclick="filterTx('income')">Income</button>
                    <button class="filter-tab" onclick="filterTx('expense')">Expense</button>
                </div>
            </div>
            <div id="transactions-list">
                <div class="empty-state">
                    <div class="icon">📋</div>
                    <p>No transactions yet. Add your first one!</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
    let currentType = 'income';
    let allTransactions = [];
    let myChart = null;
    let currentFilter = 'all';

    // ── AUTH ──
    function switchTab(tab) {
        document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (tab==='login'&&i===0)||(tab==='register'&&i===1)));
        document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
        document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
    }

    async function login() {
        const matric = document.getElementById('login-matric').value.trim();
        const password = document.getElementById('login-password').value.trim();
        if (!matric || !password) { showError('login-error', 'Please fill all fields!'); return; }
        const res = await fetch('/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({matric, password}) });
        const data = await res.json();
        if (data.success) { enterApp(data.name); }
        else { showError('login-error', data.message); }
    }

    async function register() {
        const name = document.getElementById('reg-name').value.trim();
        const matric = document.getElementById('reg-matric').value.trim();
        const department = document.getElementById('reg-dept').value;
        const password = document.getElementById('reg-password').value.trim();
        if (!name || !matric || !department || !password) { showError('register-error', 'Please fill all fields!'); return; }
        const res = await fetch('/register', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name, matric, department, password}) });
        const data = await res.json();
        if (data.success) { enterApp(data.name); }
        else { showError('register-error', data.message); }
    }

    function enterApp(name) {
        document.getElementById('welcome-screen').style.display = 'none';
        document.getElementById('app-screen').style.display = 'block';
        document.getElementById('user-badge').textContent = '👤 ' + name;
        loadData();
        showToast('Welcome, ' + name + '! 🎉');
    }

    async function logout() {
        await fetch('/logout');
        document.getElementById('welcome-screen').style.display = 'flex';
        document.getElementById('app-screen').style.display = 'none';
        allTransactions = [];
        if (myChart) { myChart.destroy(); myChart = null; }
    }

    // ── TRANSACTIONS ──
    function setType(type) {
        currentType = type;
        document.getElementById('btn-income').classList.toggle('active', type === 'income');
        document.getElementById('btn-expense').classList.toggle('active', type === 'expense');
        const btn = document.getElementById('add-btn');
        if (type === 'income') {
            btn.className = 'btn-add-income';
            btn.innerHTML = '<i class="fas fa-plus"></i> Add Income';
        } else {
            btn.className = 'btn-add-expense';
            btn.innerHTML = '<i class="fas fa-plus"></i> Add Expense';
        }
    }

    async function addTransaction() {
        const desc = document.getElementById('t-desc').value.trim();
        const category = document.getElementById('t-category').value;
        const amount = document.getElementById('t-amount').value;
        if (!desc) { showToast('Please enter a description!', true); return; }
        if (!amount || amount <= 0) { showToast('Please enter a valid amount!', true); return; }
        const res = await fetch('/add_transaction', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({type: currentType, category, description: desc, amount}) });
        const data = await res.json();
        if (data.success) {
            document.getElementById('t-desc').value = '';
            document.getElementById('t-amount').value = '';
            showToast(currentType === 'income' ? '✅ Income added!' : '✅ Expense recorded!');
            loadData();
        }
    }

    async function deleteTransaction(id) {
        await fetch('/delete_transaction', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({id}) });
        loadData();
        showToast('Transaction deleted!');
    }

    async function loadData() {
        const res = await fetch('/get_data');
        const data = await res.json();
        if (!data.success) return;
        allTransactions = data.transactions;
        document.getElementById('total-income').textContent = '₦' + data.income.toLocaleString('en-NG', {minimumFractionDigits:2});
        document.getElementById('total-expense').textContent = '₦' + data.expenses.toLocaleString('en-NG', {minimumFractionDigits:2});
        const balEl = document.getElementById('total-balance');
        balEl.textContent = '₦' + data.balance.toLocaleString('en-NG', {minimumFractionDigits:2});
        balEl.style.color = data.balance >= 0 ? 'var(--green)' : 'var(--red)';
        renderTransactions();
        renderChart(data.categories, data.income, data.expenses);
    }

    function filterTx(type) {
        currentFilter = type;
        document.querySelectorAll('.filter-tab').forEach((t,i) => t.classList.toggle('active', ['all','income','expense'][i] === type));
        renderTransactions();
    }

    const categoryIcons = { Food:'🍔', Transport:'🚌', Books:'📚', Rent:'🏠', Entertainment:'🎮', Health:'💊', Clothing:'👕', Allowance:'💵', 'Part-time':'💼', General:'💰', Other:'📦' };

    function renderTransactions() {
        const list = document.getElementById('transactions-list');
        const filtered = currentFilter === 'all' ? allTransactions : allTransactions.filter(t => t.type === currentFilter);
        if (filtered.length === 0) {
            list.innerHTML = '<div class="empty-state"><div class="icon">📋</div><p>No transactions found!</p></div>';
            return;
        }
        list.innerHTML = filtered.map(t => `
            <div class="transaction-item">
                <div class="transaction-left">
                    <div class="transaction-icon ${t.type}">${categoryIcons[t.category] || '💰'}</div>
                    <div class="transaction-info">
                        <div class="desc">${t.description}</div>
                        <div class="meta">${t.category} • ${t.date}</div>
                    </div>
                </div>
                <div class="transaction-right">
                    <div class="transaction-amount ${t.type}">${t.type==='income'?'+':'-'}₦${t.amount.toLocaleString('en-NG',{minimumFractionDigits:2})}</div>
                    <button class="btn-delete" onclick="deleteTransaction('${t.id}')"><i class="fas fa-trash"></i></button>
                </div>
            </div>`).join('');
    }

    function renderChart(categories, income, expenses) {
        const canvas = document.getElementById('myChart');
        const noChart = document.getElementById('no-chart');
        if (income === 0 && expenses === 0) { canvas.style.display='none'; noChart.style.display='block'; return; }
        canvas.style.display = 'block'; noChart.style.display = 'none';
        if (myChart) myChart.destroy();
        const labels = ['Income', ...Object.keys(categories)];
        const values = [income, ...Object.values(categories)];
        const colors = ['#00d4aa','#ff6b6b','#ffd93d','#0095ff','#a29bfe','#fd79a8','#00b894','#e17055'];
        myChart = new Chart(canvas, {
            type: 'doughnut',
            data: { labels, datasets: [{ data: values, backgroundColor: colors.slice(0, values.length), borderWidth: 0 }] },
            options: { responsive:true, maintainAspectRatio:false, plugins: { legend: { position:'bottom', labels:{ color:'#e0e0e0', font:{size:11}, padding:10 } } }, cutout:'60%' }
        });
    }

    // ── HELPERS ──
    function showError(id, msg) {
        const el = document.getElementById(id);
        el.textContent = msg; el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 4000);
    }

    function showToast(msg, isError=false) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.className = 'toast' + (isError ? ' error' : '') + ' show';
        setTimeout(() => toast.classList.remove('show'), 3000);
    }
</script>
</body>
</html>
